raw_wrf_glob: data/processed/wrf_aures_ready.nc
raw_era5_glob: data/processed/era5_aures_ready.nc

input_variables:
  - t2m
  - u10
  - v10

target_variables:
  - t2m
  - u10
  - v10

time_dim: time
lat_dim: lat
lon_dim: lon
engine: netcdf4
chunks_time: 24

batch_size: 4
num_workers: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2

train_split: 0.8
val_split: 0.1
test_split: 0.1
split_seed: 42
