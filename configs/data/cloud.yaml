raw_wrf_glob: data/raw/wrf/*.nc
raw_era5_glob: data/raw/era5/*.nc

input_variables:
  - t2m
  - u10
  - v10
  - sp

target_variables:
  - t2m
  - u10
  - v10
  - sp

time_dim: time
lat_dim: lat
lon_dim: lon
engine: h5netcdf
chunks_time: 48

batch_size: 8
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4

train_split: 0.85
val_split: 0.1
test_split: 0.05
split_seed: 42
